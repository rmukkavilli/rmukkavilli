name: Playwright Pytest CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # ✅ Add timeout

    defaults:
      run:
        working-directory: playwright-demo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browser
      run: |
        python -m playwright install --with-deps chromium  # ✅ Fixed

    - name: Run tests
      run: |
        pytest test -v --timeout=30  # ✅ Add timeout

    - name: Upload test artifacts
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v5
      with:
        name: playwright-traces
        path: playwright-demo/test-results/  # ✅ Include working-directory path